<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline — Taskivo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050508;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .starfield {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.3), transparent);
    }
    .container {
      position: relative; z-index: 1;
      text-align: center; max-width: 400px; padding: 2rem;
    }
    .icon-ring {
      width: 80px; height: 80px; margin: 0 auto 2rem;
      border-radius: 50%; border: 2px solid rgba(239, 68, 68, 0.2);
      display: flex; align-items: center; justify-content: center;
      animation: pulse 3s ease-in-out infinite;
    }
    .icon-ring svg {
      width: 32px; height: 32px; color: #ef4444;
    }
    h1 {
      font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;
      color: #e2e8f0;
    }
    h1 span { color: #ef4444; }
    .subtitle {
      font-size: 0.6rem; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.2em;
      margin-bottom: 2rem;
    }
    .terminal-line {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 1rem 1.25rem;
      text-align: left; margin-bottom: 2rem;
    }
    .terminal-line p {
      font-size: 0.7rem; color: #9ca3af; line-height: 1.8;
    }
    .terminal-line .prompt { color: #00d4ff; }
    .terminal-line .error { color: #ef4444; }
    .terminal-line .dim { color: #4b5563; }
    .retry-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.625rem 1.5rem; border-radius: 12px;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.2);
      color: #00d4ff; font-family: inherit;
      font-size: 0.75rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .retry-btn:hover {
      background: rgba(0, 212, 255, 0.15);
      border-color: rgba(0, 212, 255, 0.4);
    }
    .retry-btn svg { width: 14px; height: 14px; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.1); }
      50% { box-shadow: 0 0 20px 4px rgba(239, 68, 68, 0.15); }
    }
    @media (max-width: 480px) {
      .container { padding: 1.5rem; }
      h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="starfield"></div>
  <div class="container">
    <div class="icon-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4" />
        <path d="M5 19.5C5.5 18 6 15 6 12c0-.7.12-1.37.34-2" />
        <path d="M17.29 21.02c.12-.6.43-2.3.5-3.02" />
        <path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4" />
        <path d="M8.65 22c.21-.66.45-1.32.57-2" />
        <path d="M14 13.12c0 2.38 0 6.38-1 8.88" />
        <path d="M2 16h.01" />
        <path d="M21.8 16c.2-2 .131-5.354 0-6" />
        <path d="M9 6.8a6 6 0 0 1 9 5.2c0 .47 0 1.17-.02 2" />
      </svg>
    </div>
    <h1><span>&gt;</span> Connection Lost</h1>
    <p class="subtitle">Network Status: Offline</p>
    <div class="terminal-line">
      <p><span class="prompt">$</span> taskivo status --network</p>
      <p><span class="error">ERR_NO_CONNECTION</span> <span class="dim">Unable to reach servers</span></p>
      <p><span class="dim">Cached pages may still be available.</span></p>
    </div>
    <button class="retry-btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        <polyline points="21 3 21 9 15 9" />
      </svg>
      Retry Connection
    </button>
  </div>
</body>
</html>
